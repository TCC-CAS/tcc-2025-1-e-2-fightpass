<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightPass - Check-in</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .qr-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }
        .qr-frame {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin: 20px 0;
        }
        .timer {
            font-weight: bold;
            color: var(--primary-blue);
            font-size: 1.2rem;
        }
    </style>
</head>
<body class="light-theme">
    <main class="main-content">
        <header style="margin-bottom: 30px;">
            <h1 style="font-size: 28px;">Check-in na Academia</h1>
            <p style="color: #64748B;">Apresente o código abaixo no leitor da recepção.</p>
        </header>

        <section class="card-white qr-container">
            <h2 style="font-size: 20px;">Seu QR Code de Presença</h2>
            
            <div class="qr-frame">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=FightPass-Checkin-User123" alt="QR Code de Check-in" style="width: 250px; height: 250px;">
            </div>

            <p style="font-size: 14px; color: #64748B;">O código atualiza automaticamente em:</p>
            <p class="timer" id="countdown">00:45</p>

            <div style="margin-top: 30px; width: 100%; max-width: 300px;">
                <button class="btn-primary" onclick="window.location.reload()">Atualizar Agora</button>
                <button class="btn-google" style="margin-top: 10px;" onclick="location.href='dashboard.html'">Voltar ao Início</button>
            </div>
        </section>
    </main>

    <script src="js/layout.js"></script>
    <script>
        let seconds = 45;
        const display = document.querySelector('#countdown');
        
        setInterval(() => {
            seconds--;
            if (seconds < 0) seconds = 45;
            const s = seconds < 10 ? '0' + seconds : seconds;
            display.textContent = `00:${s}`;
        }, 1000);
    </script>
</body>
</html>
