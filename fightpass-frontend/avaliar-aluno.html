<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightPass - Avaliar Aluno</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme">
    <main class="main-content">
        <header style="margin-bottom: 30px;">
            <h1 style="font-size: 28px;">Avaliar Aluno</h1>
            <p style="color: #64748B;">Atribua notas e comentários sobre o desempenho técnico.</p>
        </header>

        <section class="card-white" style="max-width: 800px;">
            <form>
                <div class="input-group">
                    <label>Selecionar aluno</label>
                    <select class="input-field">
                        <option>João Silva</option>
                        <option>Maria Lopes</option>
                        <option>Pedro Alves</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Nota (0-10)</label>
                    <input type="number" class="input-field" step="0.1" min="0" max="10" value="9.0">
                </div>

                <div class="input-group">
                    <label>Comentário</label>
                    <textarea class="input-field" style="height: 120px; padding: 15px; resize: none;" placeholder="Ex.: Excelente evolução técnica e disciplina."></textarea>
                </div>

                <div style="margin-top: 20px;">
                    <button type="submit" class="btn-primary" style="width: auto; padding: 12px 40px;">Salvar Avaliação</button>
                    <button type="button" class="btn-google" style="margin-left: 10px; width: auto;" onclick="history.back()">Cancelar</button>
                </div>
            </form>
        </section>
    </main>

    <script src="js/layout.js"></script>
</body>
</html>
