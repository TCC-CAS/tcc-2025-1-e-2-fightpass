<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightPass - Minhas Aulas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme">
    <main class="main-content">
        <header style="margin-bottom: 30px;">
            <h1 style="font-size: 28px;">Minhas aulas</h1>
            <p style="color: #64748B;">Gerencie seus agendamentos e presenças confirmadas.</p>
        </header>

        <div class="card-white">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Dia</th>
                        <th>Hora</th>
                        <th>Modalidade</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>18/02</td>
                        <td>Qua</td>
                        <td>19:00</td>
                        <td><span class="badge-modalidade">Muay Thai</span></td>
                        <td><button class="btn-cancel">Cancelar</button></td>
                    </tr>
                    <tr>
                        <td>20/02</td>
                        <td>Sex</td>
                        <td>07:30</td>
                        <td><span class="badge-modalidade">Judô</span></td>
                        <td><button class="btn-cancel">Cancelar</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <script src="js/layout.js"></script>
</body>
</html>
