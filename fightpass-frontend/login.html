<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightPass - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme">
    <div class="search-bar-top">
        <div class="logo">FightPass</div>
        <input type="text" class="search-input" placeholder="Pesquisar... (academia, modalidade, aluno)">
    </div>

    <div class="login-container">
        <div class="card-white" style="width: 420px;">
            <h1 style="margin-bottom: 5px;">Entrar</h1>
            <p style="color: #64748B; margin-bottom: 25px; font-size: 14px;">Faça login para acessar o FightPass.</p>
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" class="input-field" placeholder="seuemail@exemplo.com">
            </div>
            
            <div class="input-group">
                <label>Senha</label>
                <input type="password" class="input-field" placeholder="••••••••">
            </div>
            
            <button class="btn-primary" onclick="location.href='dashboard.html'">Entrar</button>
            
            <div style="text-align: center; margin: 15px 0; color: #94A3B8; font-size: 12px;">ou</div>
            
            <button class="btn-google">Entrar com Google</button>
        </div>
    </div>
</body>
</html>
