<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightPass - Perfil do Aluno</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme">
    <main class="main-content">
        <header style="margin-bottom: 30px;">
            <h1 style="font-size: 28px;">Perfil do Aluno - Gestão</h1>
        </header>

        <section class="card-white" style="max-width: 900px;">
            <div style="margin-bottom: 30px;">
                <h2 style="font-size: 22px; color: var(--primary-blue);">João Silva</h2>
                <p><strong>Modalidade:</strong> Muay Thai</p>
                <p style="color: #10B981;"><strong>Presença média:</strong> 92%</p>
                <p><strong>Nota média:</strong> 8.6</p>
            </div>

            <hr style="border: 0; border-top: 1px solid #E2E8F0; margin: 20px 0;">

            <h3 style="font-size: 18px; margin-bottom: 15px;">Linha do tempo de evolução:</h3>
            <div class="evolution-list">
                <div style="padding: 12px; border-bottom: 1px solid #F1F5F9; display: flex; justify-content: space-between;">
                    <span>Mês 1</span>
                    <strong>Nota 7.0</strong>
                </div>
                <div style="padding: 12px; border-bottom: 1px solid #F1F5F9; display: flex; justify-content: space-between;">
                    <span>Mês 2</span>
                    <strong>Nota 7.3</strong>
                </div>
                <div style="padding: 12px; border-bottom: 1px solid #F1F5F9; display: flex; justify-content: space-between;">
                    <span>Mês 3</span>
                    <strong>Nota 7.6</strong>
                </div>
                <div style="padding: 12px; border-bottom: 1px solid #F1F5F9; display: flex; justify-content: space-between;">
                    <span>Mês 4</span>
                    <strong>Nota 7.9</strong>
                </div>
                <div style="padding: 12px; border-bottom: 1px solid #F1F5F9; display: flex; justify-content: space-between;">
                    <span>Mês 5</span>
                    <strong>Nota 8.2</strong>
                </div>
            </div>

            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button class="btn-primary" style="width: auto; padding: 10px 25px;" onclick="location.href='avaliar.html'">Nova Avaliação</button>
                <button class="btn-secondary" style="width: auto; padding: 10px 25px;" onclick="history.back()">Voltar</button>
            </div>
        </section>
    </main>

    <script src="js/layout.js"></script>
</body>
</html>
