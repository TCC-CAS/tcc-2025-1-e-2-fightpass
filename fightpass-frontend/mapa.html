<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightPass - Mapa de Academias</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme">
    <main class="main-content">
        <header style="margin-bottom: 30px;">
            <h1>Mapa de academias</h1>
            <p style="color: #64748B;">Pesquise e filtre por modalidades.</p>
        </header>

        <div style="display:flex; gap:10px; margin-bottom: 20px;">
            <button class="btn-outline" style="background: white; border: 1px solid #E2E8F0; padding: 8px 15px; border-radius: 20px;">Judô</button>
            <button class="btn-outline" style="background: white; border: 1px solid #E2E8F0; padding: 8px 15px; border-radius: 20px;">Jiu-Jitsu</button>
            <button class="btn-outline" style="background: white; border: 1px solid #E2E8F0; padding: 8px 15px; border-radius: 20px;">Muay Thai</button>
            <button class="btn-outline" style="background: white; border: 1px solid #E2E8F0; padding: 8px 15px; border-radius: 20px;">Boxe</button>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
            <div class="card-white" style="height: 500px; margin-top: 0; background: #E2E8F0; display: flex; align-items: center; justify-content: center; position: relative;">
                <span style="color: #64748B; font-weight: 600;">[ Google Maps Estilizado ]</span>
                <div style="position: absolute; top: 30%; left: 40%; width: 12px; height: 12px; background: var(--primary-blue); border-radius: 50%; border: 2px solid white;"></div>
                <div style="position: absolute; top: 60%; left: 70%; width: 12px; height: 12px; background: var(--primary-blue); border-radius: 50%; border: 2px solid white;"></div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div class="card-white" style="margin-top: 0; padding: 15px;">
                    <strong>Gracie Center</strong>
                    <p style="font-size: 12px; color: #64748B;">4,8 ★ • 1,2 km</p>
                    <p style="font-size: 13px; margin-top: 5px;">Jiu-Jitsu</p>
                </div>
                <div class="card-white" style="margin-top: 0; padding: 15px;">
                    <strong>Dojo Sakura</strong>
                    <p style="font-size: 12px; color: #64748B;">4,6 ★ • 2,0 km</p>
                    <p style="font-size: 13px; margin-top: 5px;">Judô • Karate</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/layout.js"></script>
</body>
</html>
