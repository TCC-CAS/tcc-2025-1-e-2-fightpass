<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightPass - Meu Perfil</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme">
    <main class="main-content">
        <header style="margin-bottom: 30px;">
            <h1 style="font-size: 28px;">Perfil</h1>
            <p style="color: #64748B;">Gerencie suas informações de cliente ou instituição.</p>
        </header>

        <section class="card-white">
            <form style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
                
                <div>
                    <h2 style="font-size: 20px; margin-bottom: 20px;">Dados básicos</h2>
                    
                    <div class="input-group">
                        <label>Nome completo / Razão social</label>
                        <input type="text" class="input-field" value="João Silva" placeholder="Ex.: Dojo Sakura">
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" class="input-field" value="joao.silva@email.com" placeholder="contato@exemplo.com">
                    </div>

                    <div class="input-group">
                        <label>Telefone</label>
                        <input type="text" class="input-field" value="(11) 99999-9999" placeholder="(11) 99999-9999">
                    </div>
                </div>

                <div>
                    <h2 style="font-size: 20px; margin-bottom: 20px;">Conta</h2>
                    
                    <div class="input-group">
                        <label>Tipo</label>
                        <select class="input-field">
                            <option selected>Cliente</option>
                            <option>Instituição</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>CPF / CNPJ</label>
                        <input type="text" class="input-field" value="000.000.000-00" placeholder="000.000.000-00">
                    </div>

                    <div class="input-group">
                        <label>Nova Senha</label>
                        <input type="password" class="input-field" placeholder="Mín. 6 caracteres">
                    </div>

                    <div class="input-group">
                        <label>Confirmar nova senha</label>
                        <input type="password" class="input-field" placeholder="Repita a senha">
                    </div>

                    <div style="margin-top: 30px; display: flex; justify-content: flex-end;">
                        <button type="submit" class="btn-primary" style="width: auto; padding: 12px 40px;">Salvar alterações</button>
                    </div>
                </div>

            </form>
        </section>
    </main>

    <script src="js/layout.js"></script>
</body>
</html>
