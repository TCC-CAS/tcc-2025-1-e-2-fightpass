<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightPass - Gestão da Instituição</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme app-shell" data-page="gestao">
    <main class="main-content">
        <header style="margin-bottom: 30px;">
            <h1 style="font-size: 28px; color: #1E293B;">Gestão da instituição</h1>
            <p style="color: #64748B;">Painel administrativo com alunos ativos, frequência média, risco de evasão e avaliação técnica.</p>
        </header>

        <div id="management-message" hidden></div>

        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px;">
            <div class="card-white" style="padding: 20px;">
                <span style="color: #64748B; font-size: 14px; font-weight: 600;">Total de alunos ativos</span>
                <div id="active-students" style="font-size: 24px; font-weight: 700; color: #3B82F6; margin-top: 5px;">-</div>
            </div>
            <div class="card-white" style="padding: 20px;">
                <span style="color: #64748B; font-size: 14px; font-weight: 600;">Frequência média</span>
                <div id="attendance-rate" style="font-size: 24px; font-weight: 700; color: #10B981; margin-top: 5px;">-</div>
            </div>
            <div class="card-white" style="padding: 20px;">
                <span style="color: #64748B; font-size: 14px; font-weight: 600;">Risco de evasão</span>
                <div id="risk-rate" style="font-size: 24px; font-weight: 700; color: #EF4444; margin-top: 5px;">-</div>
            </div>
        </div>

        <div class="card-white" style="padding: 30px;">
            <h2 style="font-size: 18px; margin-bottom: 20px; color: #1E293B;">Lista de alunos</h2>
            <table>
                <thead>
                    <tr>
                        <th>Aluno</th>
                        <th>Modalidade</th>
                        <th>Status</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="students-table"></tbody>
            </table>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/pages.js"></script>
</body>
</html>
